<!DOCTYPE html>

<html>
<head>
  <title>Lost & Found AI</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    .form-group {
      margin: 10px 0;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0056b3;
    }

    #preview {
      margin-top: 15px;
      border-radius: 10px;
      max-width: 200px;
    }

    .results {
      margin-top: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
      background: #fafafa;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .best {
      border: 2px solid green;
      background: #eaffea;
    }

    .loading {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>

</head>

<body>

<div class="container">
  <h1>🔍 Lost & Found AI</h1>

  <div class="form-group">
    <input type="text" id="title" placeholder="Title">
  </div>

  <div class="form-group">
    <textarea id="description" placeholder="Description"></textarea>
  </div>

  <div class="form-group">
    <input type="text" id="location" placeholder="Location">
  </div>

  <div class="form-group">
    <select id="type">
      <option value="lost">Lost</option>
      <option value="found">Found</option>
    </select>
  </div>

  <div class="form-group">
    <input type="file" id="image">
  </div>

<button onclick="upload()">Upload & Find Matches</button>

  <img id="preview"/>

  <div id="loading" class="loading"></div>

  <h2>Matches</h2>
  <div id="results" class="results"></div>
</div>

<script>
async function upload() {
  const file = document.getElementById("image").files[0];
  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;
  const location = document.getElementById("location").value;
  const type = document.getElementById("type").value;

  if (!file) {
    alert("Please upload an image");
    return;
  }

  document.getElementById("preview").src = URL.createObjectURL(file);
  document.getElementById("loading").innerText = "Searching matches...";

  const formData = new FormData();
  formData.append("title", title);
  formData.append("description", description);
  formData.append("location", location);
  formData.append("type", type);
  formData.append("image", file);

  try {
    const res = await fetch("http://127.0.0.1:8001/items", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("loading").innerText = "";

    console.log("API RESPONSE:", data);

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (!data.possible_matches || data.possible_matches.length === 0) {
      resultsDiv.innerHTML = "<p>No matches found</p>";
      return;
    }

    data.possible_matches.forEach((item, index) => {
      const card = document.createElement("div");
      card.className = "card";
      if (index === 0) card.classList.add("best");

      card.innerHTML = `
        <img src="${item.image_url}">
        <h4>${item.title}</h4>
        <p><b>Location:</b> ${item.location || "N/A"}</p>
        <p><b>Score:</b> ${item.score}</p>
      `;

      resultsDiv.appendChild(card);
    });

  } catch (err) {
    console.error(err);
    alert("Something went wrong");
    document.getElementById("loading").innerText = "";
  }
}
</script>

</body>
</html>
